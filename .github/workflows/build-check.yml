name: build check

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start containers (Mock Mode)
      run: |
        export VITE_MOCK=true
        export FRONTEND_PORT=3000
        export API_PORT=8787
        docker compose -f docker-compose-build.yml up -d --build frontend backend

    - name: Wait for services to be healthy
      run: |
        echo "Waiting for frontend and backend to start..."
        sleep 15

        # Check container status
        docker compose -f docker-compose-build.yml ps

        # Wait for health checks for frontend/backend only
        MAX_WAIT=120
        INTERVAL=10
        ELAPSED=0

        while [ $ELAPSED -lt $MAX_WAIT ]; do
          BACKEND_HEALTH=$(docker inspect backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")
          FRONTEND_HEALTH=$(docker inspect frontend --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")

          echo "Current health status - backend: $BACKEND_HEALTH, frontend: $FRONTEND_HEALTH"

          if [ "$BACKEND_HEALTH" = "healthy" ] && [ "$FRONTEND_HEALTH" = "healthy" ]; then
            echo "Mock services are healthy!"
            exit 0
          fi

          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "Timeout waiting for services in Mock Mode"
        docker compose -f docker-compose-build.yml logs
        exit 1

    - name: Show logs on failure
      if: failure()
      run: docker compose -f docker-compose-build.yml logs

    - name: Cleanup
      if: always()
      run: docker compose -f docker-compose-build.yml down -v
