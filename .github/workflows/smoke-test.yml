name: smoke-test

on:
  push:
    branches:
      - main
      - it_test
  pull_request:
    branches:
      - main
      - it_test
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: [self-hosted, Linux, ARM64, default]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start containers
      run: docker compose -f docker-compose-build.yml up -d --build

    - name: Wait for services to be healthy
      run: |
        echo "Waiting for services to start..."
        sleep 30

        MAX_WAIT=600
        INTERVAL=15
        ELAPSED=0

        while [ $ELAPSED -lt $MAX_WAIT ]; do
          DORIS_HEALTH=$(docker inspect doris --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")
          BACKEND_HEALTH=$(docker inspect backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")
          FRONTEND_HEALTH=$(docker inspect frontend --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")

          echo "Current health status - doris: $DORIS_HEALTH, backend: $BACKEND_HEALTH, frontend: $FRONTEND_HEALTH"

          if [ "$DORIS_HEALTH" = "healthy" ] && [ "$BACKEND_HEALTH" = "healthy" ] && [ "$FRONTEND_HEALTH" = "healthy" ]; then
            echo "All services are healthy!"
            exit 0
          fi

          DORIS_RUNNING=$(docker inspect doris --format='{{.State.Running}}' 2>/dev/null || echo "false")
          BACKEND_RUNNING=$(docker inspect backend --format='{{.State.Running}}' 2>/dev/null || echo "false")
          FRONTEND_RUNNING=$(docker inspect frontend --format='{{.State.Running}}' 2>/dev/null || echo "false")

          if [ "$DORIS_RUNNING" = "true" ] && [ "$BACKEND_RUNNING" = "true" ] && [ "$FRONTEND_RUNNING" = "true" ]; then
            if [ "$DORIS_HEALTH" != "starting" ] && [ "$BACKEND_HEALTH" != "starting" ] && [ "$FRONTEND_HEALTH" != "starting" ]; then
              echo "All services are running!"
              exit 0
            fi
          fi

          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "Timeout waiting for services to be healthy"
        docker compose -f docker-compose-build.yml logs
        exit 1

    - name: Trigger Openclaw webtest-agent
      run: |
        echo "Sending test request to Openclaw webtest-agent..."
        OPENCLAW_GATEWAY_PORT=18789 \
        OPENCLAW_GATEWAY_TOKEN=c84c7081538b3cd476f687c3da3706346591b0cb675169207d05f0a0c4b77cd6 \
        openclaw agent \
          --agent webtest-agent \
          --message "对http：127.0.0.1:3000进行全面测试，结果写回到https://github.com/opsrobot-observability/openclaw-observability-platform 当前的pullrequest"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-results
        path: ./test-results/

    - name: Show logs on failure
      if: failure()
      run: docker compose -f docker-compose-build.yml logs

    - name: Cleanup
      if: always()
      run: docker compose -f docker-compose-build.yml down -v
